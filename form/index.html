<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <center>
        <h1>School Registeration Form</h1>
    </center>
  <div class="container">
      <p>First Name : <input type="text" placeholder="Enter your first name"></p>
    <p>Last Name : <input type="text" placeholder="Enter your last name"></p>
    <p>Email : <input type="email" placeholder="Enter your email"></p>
    <p>Password : <input type="password" placeholder="Enter your password"></p>
    <p>Gender : <input type="radio" name="gender" value="male">Male
    <input type="radio" name="gender" value="female">Female
    <input type="radio" name="gender" value="other">Other</p>
    <p>Address : <input type="text" placeholder="Address"></p>
    <p>City : <input type="text" placeholder="City"></p>
    <p>State : <input type="text" placeholder="State"></p>
    <p>pin Code : <input type="text" placeholder="pin Code"></p>
    <p>Country : <input type="text" placeholder="Country"></p>
    <p>Phone : <input type="text" placeholder="Phone"></p>
    <p>Course : <select>
        <option value="bscs">BSCS</option>
        <option value="bsse">BSSE</option>
        <option value="bsit">BSIT</option>
        <option value="bsse">BSSE</option>
    </select></p>
    <p><button>Submit</button></p>
  </div>
</body>
</html>
